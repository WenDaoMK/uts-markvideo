name: HBuilderX Cloud Package

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Android, iOS, or both
        required: true
        type: choice
        default: android
        options:
          - android
          - ios
          - all
      safe_mode:
        description: Use DCloud safe packaging
        required: true
        type: boolean
        default: true
      android_pack_type:
        description: Android cert mode, 3=cloud cert, 0=own cert
        required: true
        type: choice
        default: "3"
        options:
          - "3"
          - "0"
          - "1"
          - "2"

jobs:
  package:
    name: Package ${{ inputs.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PROJECT_PATH: ${{ github.workspace }}
      PACK_PLATFORM_INPUT: ${{ inputs.platform }}
      SAFE_MODE: ${{ inputs.safe_mode }}
      ANDROID_PACK_TYPE: ${{ inputs.android_pack_type }}
      ANDROID_PACKAGE_NAME: ${{ vars.ANDROID_PACKAGE_NAME }}
      ANDROID_CERT_ALIAS: ${{ vars.ANDROID_CERT_ALIAS }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
      IOS_SUPPORTED_DEVICE: ${{ vars.IOS_SUPPORTED_DEVICE }}
      IOS_CHANNELS: ${{ vars.IOS_CHANNELS }}
      IOS_IS_PRISONBREAK: ${{ vars.IOS_IS_PRISONBREAK }}
      HBUILDERX_URL: ${{ vars.HBUILDERX_URL }}
      DCLOUD_USERNAME: ${{ secrets.DCLOUD_USERNAME }}
      DCLOUD_PASSWORD: ${{ secrets.DCLOUD_PASSWORD }}
      ANDROID_CERT_BASE64: ${{ secrets.ANDROID_CERT_BASE64 }}
      ANDROID_CERT_PASSWORD: ${{ secrets.ANDROID_CERT_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
      IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run structure tests
        run: npm test

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1

      - name: Install HBuilderX Linux CLI
        id: hbuilderx
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/hbuilderx-download"
          HBUILDERX_URL="${HBUILDERX_URL:-https://download1.dcloud.net.cn/download/HBuilderX.5.07.2026041006.linux_x64.full.tar.gz}"
          curl -L "$HBUILDERX_URL" -o "$RUNNER_TEMP/hbuilderx-download/hbuilderx.tar.gz"
          tar -xzf "$RUNNER_TEMP/hbuilderx-download/hbuilderx.tar.gz" -C "$RUNNER_TEMP/hbuilderx-download"
          HBUILDERX_HOME="$(find "$RUNNER_TEMP/hbuilderx-download" -maxdepth 2 -type f -name cli -printf '%h\n' | head -n 1)"
          if [ -z "$HBUILDERX_HOME" ]; then
            echo "Could not find HBuilderX cli in the downloaded archive." >&2
            exit 1
          fi
          chmod +x "$HBUILDERX_HOME/cli"
          echo "home=$HBUILDERX_HOME" >> "$GITHUB_OUTPUT"
          "$HBUILDERX_HOME/cli" ver || true

      - name: Start HBuilderX CLI service
        run: |
          set -euo pipefail
          xvfb-run -a "${{ steps.hbuilderx.outputs.home }}/cli" open

      - name: Log in to DCloud
        run: |
          set -euo pipefail
          "${{ steps.hbuilderx.outputs.home }}/cli" user login \
            --username "$DCLOUD_USERNAME" \
            --password "$DCLOUD_PASSWORD"
          "${{ steps.hbuilderx.outputs.home }}/cli" user info

      - name: Decode signing files
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"

          if [ -n "${ANDROID_CERT_BASE64:-}" ]; then
            printf '%s' "$ANDROID_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/signing/android.keystore"
            echo "ANDROID_CERT_FILE=$RUNNER_TEMP/signing/android.keystore" >> "$GITHUB_ENV"
          fi

          if [ -n "${IOS_PROFILE_BASE64:-}" ]; then
            printf '%s' "$IOS_PROFILE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/ios.mobileprovision"
            echo "IOS_PROFILE_FILE=$RUNNER_TEMP/signing/ios.mobileprovision" >> "$GITHUB_ENV"
          fi

          if [ -n "${IOS_CERT_BASE64:-}" ]; then
            printf '%s' "$IOS_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/signing/ios.p12"
            echo "IOS_CERT_FILE=$RUNNER_TEMP/signing/ios.p12" >> "$GITHUB_ENV"
          fi

      - name: Resolve package platform
        run: |
          set -euo pipefail
          if [ "$PACK_PLATFORM_INPUT" = "all" ]; then
            echo "PACK_PLATFORM=android,ios" >> "$GITHUB_ENV"
          else
            echo "PACK_PLATFORM=$PACK_PLATFORM_INPUT" >> "$GITHUB_ENV"
          fi

      - name: Create HBuilderX pack config
        run: node scripts/create-hbuilderx-pack-config.mjs "$RUNNER_TEMP/hbuilderx-pack.json"

      - name: Import project into HBuilderX
        run: |
          set -euo pipefail
          "${{ steps.hbuilderx.outputs.home }}/cli" project open --path "$PROJECT_PATH"

      - name: Package app
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/app-artifacts
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          PACK_LOG="$ARTIFACT_DIR/hbuilderx-pack.log"

          set +e
          "${{ steps.hbuilderx.outputs.home }}/cli" pack --config "$RUNNER_TEMP/hbuilderx-pack.json" 2>&1 | tee "$PACK_LOG"
          PACK_EXIT=${PIPESTATUS[0]}
          set -e

          grep -Eo 'https://service\.dcloud\.net\.cn/build/download/[[:alnum:]-]+' "$PACK_LOG" \
            | sort -u > "$RUNNER_TEMP/hbuilderx-download-urls.txt" || true

          package_index=0
          while IFS= read -r download_url; do
            if [ -z "$download_url" ]; then
              continue
            fi
            package_index=$((package_index + 1))
            curl -L "$download_url" -o "$ARTIFACT_DIR/dcloud-package-$package_index"
          done < "$RUNNER_TEMP/hbuilderx-download-urls.txt"

          if [ -d unpackage ]; then
            find unpackage -type f \( \
              -name '*.apk' -o \
              -name '*.aab' -o \
              -name '*.ipa' -o \
              -name '*.wgt' \
            \) -exec cp -v {} "$ARTIFACT_DIR/" \;
          fi

          if [ "$PACK_EXIT" -ne 0 ]; then
            exit "$PACK_EXIT"
          fi

          if ! find "$ARTIFACT_DIR" -type f ! -name hbuilderx-pack.log | grep -q .; then
            echo "No package artifact or DCloud download URL was found." >&2
            exit 1
          fi

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-package-${{ inputs.platform }}-${{ github.run_number }}
          if-no-files-found: error
          path: ${{ runner.temp }}/app-artifacts/**
